name: "Publish to PyPI and GitHub"

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: "Build, Publish, and Release"
    runs-on: ubuntu-latest
    
    # Notice: The 'permissions: id-token: write' block has been removed 
    # because we are using an API token instead of OIDC Trusted Publishing.
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: "Install build dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: "Build package"
        run: python -m build

      - name: "Check package metadata"
        run: python -m twine check dist/*

      - name: "Publish package to PyPI via API Token"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*